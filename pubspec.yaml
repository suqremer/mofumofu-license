name: mofumofu_license
description: "うちの子免許証 - ペット免許証メーカー"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状態管理
  flutter_riverpod: ^2.6.1

  # ルーティング（画面遷移）
  go_router: ^14.8.1

  # ローカルDB
  sqflite: ^2.4.2
  path_provider: ^2.1.5

  # 写真選択・加工
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # 設定・永続化
  shared_preferences: ^2.3.5

  # 外部リンク
  url_launcher: ^6.3.1

  # カメラロール保存
  gal: ^2.3.2

  # 効果音
  audioplayers: ^6.1.0

  # フォント
  google_fonts: ^6.2.1

  # 広告
  google_mobile_ads: ^5.3.0

  # アプリ内課金（RevenueCat）
  purchases_flutter: ^8.9.0

  # 背景自動削除（ONNX MLモデル）
  image_background_remover: ^2.0.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.2

  # ユーティリティ
  intl: ^0.20.2
  path: ^1.9.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/costumes/
    - assets/tutorial/
