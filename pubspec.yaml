name: mofumofu_license
description: "うちの子免許証 - ペット免許証メーカー"
publish_to: 'none'
version: 1.1.0+551

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状態管理
  flutter_riverpod: ^2.6.1

  # ルーティング（画面遷移）
  go_router: ^14.8.1

  # ローカルDB
  sqflite: ^2.4.2
  path_provider: ^2.1.5

  # 写真選択・加工
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  camera: ^0.11.0+2

  # 設定・永続化
  shared_preferences: ^2.3.5

  # 外部リンク
  url_launcher: ^6.3.1

  # カメラロール保存
  gal: ^2.3.2

  # 効果音
  audioplayers: ^6.1.0

  # フォント
  google_fonts: ^6.2.1

  # 広告
  google_mobile_ads: ^5.3.0

  # アプリ内課金（RevenueCat）
  purchases_flutter: ^8.9.0

  # 背景自動削除（ONNX MLモデル）
  image_background_remover: ^2.0.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.2

  # NFC
  nfc_manager: ^3.5.0

  # ユーティリティ
  intl: ^0.20.2
  path: ^1.9.1
  share_plus: ^10.1.4
  flutter_secure_storage: ^10.0.0
  app_tracking_transparency: ^2.0.6+1
  in_app_review: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/costumes/
    - assets/tutorial/
    - assets/fonts/
    - assets/product_photos/


  fonts:
    - family: Zen Maru Gothic
      fonts:
        - asset: assets/fonts/ZenMaruGothic-Regular.ttf
          weight: 400
        - asset: assets/fonts/ZenMaruGothic-Bold.ttf
          weight: 700
    - family: Noto Sans JP
      fonts:
        - asset: assets/fonts/NotoSansJP-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansJP-SemiBold.ttf
          weight: 600
